<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC PDF-SMCSC</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <link rel="stylesheet" href="https://pyscript.net/releases/2024.1.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2024.1.1/core.js"></script>
    
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #5f934e5b; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { background:linear-gradient(135deg, #11998e, #ffffff); padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 900px; }
        h2 { color: #2d3436; text-align: center; border-bottom: 2px solid #eee; padding-bottom: 10px; margin-top: 0; }
        .tool-grid { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 20px; justify-content: center; }
        
        .section { 
            flex: 1; 
            min-width: 320px; 
            max-width: 450px;
            padding: 30px; 
            border-radius: 20px; 
            background: #ffffff; 
            display: flex; 
            flex-direction: column;
            position: relative;
            transform: perspective(1000px) rotateX(2deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08), 0 15px 35px rgba(50,50,93,0.1), 0 20px 40px rgba(0,0,0,0.07);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid rgba(255, 255, 255, 0.6);
        }

        .section:hover {
            transform: perspective(1000px) rotateX(0deg) translateY(-15px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.15), 0 20px 40px rgba(0,0,0,0.1);
        }

        .section h3 { margin-top: 0; font-size: 1.3rem; color: #0984e3; text-align: center; text-transform: uppercase; letter-spacing: 1px; }

        .preview-box { margin-top: 20px; border: 2px dashed #0984e3; border-radius: 15px; height: 120px; background: #f8fbff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 0.9rem; color: #666; transition: 0.3s; }

        label { display: block; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }
        input[type="file"] { width: 100%; margin-top: 5px; font-size: 0.8rem; }
        
        button, .btn-link { width: 100%; background: #07d731; color: white; border: none; padding: 12px; margin-top: auto; cursor: pointer; border-radius: 6px; font-weight: bold; transition: 0.3s; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        
        .btn-merge { background: linear-gradient(135deg, #07d731 0%, #05b128 100%); box-shadow: 0 4px 0 #048a1f; margin-top: 20px; }
        .btn-merge:hover { background: #ff03e6; box-shadow: 0 4px 0 #d102bc; }
        .btn-merge:active { transform: translateY(3px); box-shadow: 0 1px 0 #048a1f; }

        #status { margin-top: 20px; text-align: center; font-weight: 500; font-size: 0.9rem; color: #636e72; border-top: 1px solid #eee; padding-top: 10px; }
        
        .support { display: inline-flex; align-items: center; justify-content: center; width: 100%; margin-top: 25px; color: #25D366; text-decoration: none; font-weight: bold; font-size: 1.1rem; transition: 0.3s; }
        .support i { font-size: 1.5rem; margin-right: 10px; }
        .support:hover { color: #128C7E; transform: scale(1.02); }

        .list-buttons { display: flex; gap: 10px; justify-content: center; margin-bottom: 15px; flex-wrap: wrap; }
        .btn-list { width: auto; background: #0984e3; padding: 10px 15px; margin: 0; font-size: 0.85rem; box-shadow: none; }
        
        #htmlViewer { display: none; margin-top: 15px; border: 2px solid #0984e3; border-radius: 10px; overflow: hidden; background: white; }
        .viewer-header { background: #eee; padding: 8px; display: flex; justify-content: space-between; align-items: center; }
        iframe { width: 100%; height: 500px; border: none; }
    </style>
</head>
<body>

<py-config>
    packages = ["pypdf"]
</py-config>

<div class="container">
    <h2>RC PDF-SMCSC</h2>
    
    <div style="display: flex; justify-content: flex-end; margin-bottom: 10px;">
        <button onclick="logout()" style="width: auto; background: #eb4d4b; padding: 8px 15px; margin: 0; box-shadow: none;">Logout</button>
    </div>

    <div class="list-buttons">
        <button class="btn-list" onclick="loadHTML('py.html')">NEW RC PDF1</button>
        <button class="btn-list" onclick="loadHTML('page2.html')">KERALA</button>
        <button class="btn-list" onclick="loadHTML('py1.html')">PONDICHERRY</button>
        <button class="btn-list" style="background: #e67e22;" onclick="window.open('pdf_bg_remover_v3.html', '_blank')">PDF REMOVER</button>
    </div>

    <div id="htmlViewer">
        <div class="viewer-header">
            <span id="viewTitle" style="font-weight: bold; color: #333; font-size: 0.85rem;">RC Page View</span>
            <button onclick="closeHTML()" style="width: auto; background: #eb4d4b; padding: 4px 12px; margin: 0; font-size: 0.75rem; box-shadow: none;">Close</button>
        </div>
        <iframe id="frameBox" src=""></iframe>
    </div>

    <div class="tool-grid">
        <div class="section">
            <div style="text-align: center; margin-bottom: 10px;">
                <i class="fas fa-file-upload" style="font-size: 2.5rem; color: #0984e3;"></i>
            </div>
            <h3>SOURCE UPLOAD PDF</h3>
            <label><i class="fas fa-file-pdf"></i> Select Source PDF</label>
            <input type="file" id="srcFile" accept=".pdf">
            
            <div class="preview-box" id="previewContainer">
                <i class="fas fa-shield-alt" style="font-size: 2rem; margin-bottom: 10px; color: #07d731;"></i>
                <span>Ready.....</span>
            </div>
            
            <button class="btn-merge" onclick="mergePDFs()"><i class="fas fa-magic"></i> RC PDF & DOWNLOAD</button>
        </div>
    </div>

    <div id="status">System Ready</div>
    
    <a href="https://api.whatsapp.com/send?phone=917094041818&text=Hi%20SMCSC%20Support,%20I%20need%20help%20with%20the%20RC%20PDF%20Tool." target="_blank" class="support">
        <i class="fab fa-whatsapp"></i> SMCSC SUPPORT
    </a>
</div>

<script>
    function loadHTML(fileName) {
        const viewer = document.getElementById('htmlViewer');
        const frame = document.getElementById('frameBox');
        frame.src = fileName;
        viewer.style.display = 'block';
        viewer.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('status').innerText = "Loading Internal Page...";
    }

    function closeHTML() {
        const viewer = document.getElementById('htmlViewer');
        document.getElementById('frameBox').src = "";
        viewer.style.display = 'none';
        document.getElementById('status').innerText = "System Ready";
    }

    let timeout;
    function logout() { window.location.href = "index.html"; }
    function resetTimer() {
        clearTimeout(timeout);
        timeout = setTimeout(logout, 600000); 
    }
    window.onload = resetTimer;
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;

    const { PDFDocument } = PDFLib;

    async function mergePDFs() {
        const srcInput = document.getElementById('srcFile').files[0];
        const status = document.getElementById('status');
        const fixedBgUrl = 'background.pdf'; 

        if (!srcInput) {
            alert("Please select a source file!");
            return;
        }

        try {
            status.innerText = "Merging Files... Please wait";
            const srcBytes = await srcInput.arrayBuffer();
            const srcDoc = await PDFDocument.load(srcBytes);
            const bgResponse = await fetch(fixedBgUrl, { cache: "no-store" });

            if (!bgResponse.ok) throw new Error("Background.pdf not found.");
            
            const bgBytes = await bgResponse.arrayBuffer();
            const dstDoc = await PDFDocument.load(bgBytes);
            const embeddedPages = await dstDoc.embedPdf(srcDoc);
            const dstPages = dstDoc.getPages();

            dstPages.forEach((page, index) => {
                const overlayPage = embeddedPages[index] || embeddedPages[0];
                const { width, height } = page.getSize();
                page.drawPage(overlayPage, { x: 0, y: 0, width, height });
            });

            const pdfBytes = await dstDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "SM CSC_" + srcInput.name;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            status.innerText = "Download Successful!";
        } catch (err) {
            status.innerText = "Error: " + err.message;
        }
    }
</script>
</body>
</html>
