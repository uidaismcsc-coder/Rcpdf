<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RC PDF-SMCSC · Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        :root {
            --neon: #00ffcc;
            --neon2: #00aaff;
            --accent: #7c3aed;
            --danger: #ff4757;
            --warn: #ffa502;
            --bg: #060e1a;
            --card: rgba(255,255,255,0.04);
            --border: rgba(0,255,204,0.18);
            --text: rgba(255,255,255,0.85);
            --muted: rgba(255,255,255,0.35);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Rajdhani', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,255,204,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,204,0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 0;
        }

        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.1;
            pointer-events: none;
            z-index: 0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        .bg-orb1 { width: 500px; height: 500px; background: #00ffcc; top: -150px; right: -100px; }
        .bg-orb2 { width: 400px; height: 400px; background: #7c3aed; bottom: -100px; left: -100px; animation-delay: -4s; }

        @keyframes bgPulse { from { opacity: 0.08; } to { opacity: 0.14; } }

        .main-wrap {
            position: relative;
            z-index: 1;
            max-width: 960px;
            margin: 0 auto;
            animation: pageIn 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
        }

        @keyframes pageIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 28px;
            background: rgba(0,255,204,0.04);
            border: 1px solid var(--border);
            border-radius: 16px;
            margin-bottom: 20px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
            box-shadow: 0 0 15px var(--neon);
        }

        .header-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--neon);
            letter-spacing: 3px;
            text-shadow: 0 0 20px rgba(0,255,204,0.4);
        }

        .header-sub {
            font-size: 0.75rem;
            color: var(--muted);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }

        /* Buttons Row */
        .nav-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .nav-btn {
            flex: 1;
            min-width: 130px;
            padding: 12px 16px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--neon);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.25s;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        .nav-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0,255,204,0.1), transparent);
            opacity: 0;
            transition: 0.25s;
        }

        .nav-btn:hover { 
            border-color: var(--neon); 
            color: white;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,255,204,0.2);
        }
        .nav-btn:hover::before { opacity: 1; }

        .nav-btn.orange {
            color: var(--warn);
            border-color: rgba(255,165,2,0.3);
        }
        .nav-btn.orange:hover {
            border-color: var(--warn);
            box-shadow: 0 8px 25px rgba(255,165,2,0.2);
        }

        .logout-btn {
            padding: 10px 20px;
            background: rgba(255,71,87,0.1);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 10px;
            color: var(--danger);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.8rem;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .logout-btn:hover {
            background: rgba(255,71,87,0.2);
            border-color: var(--danger);
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,71,87,0.3);
        }

        /* Viewer */
        #htmlViewer {
            display: none;
            margin-bottom: 20px;
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
        }

        .viewer-header {
            background: rgba(0,255,204,0.05);
            padding: 12px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .viewer-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon);
            letter-spacing: 2px;
        }

        .close-btn {
            padding: 6px 14px;
            background: rgba(255,71,87,0.15);
            border: 1px solid rgba(255,71,87,0.3);
            border-radius: 6px;
            color: var(--danger);
            font-family: 'Rajdhani', sans-serif;
            font-weight: 700;
            font-size: 0.75rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .close-btn:hover { background: rgba(255,71,87,0.3); }

        iframe { width: 100%; height: 500px; border: none; background: white; }

        /* Upload card */
        .card-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .upload-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
        }

        .upload-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(0,255,204,0.6), transparent);
        }

        .upload-card:hover {
            border-color: rgba(0,255,204,0.35);
            transform: translateY(-8px) rotateX(2deg);
            box-shadow: 0 30px 60px rgba(0,0,0,0.4), 0 0 40px rgba(0,255,204,0.08);
        }

        .card-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, rgba(0,255,204,0.15), rgba(0,170,255,0.1));
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(0,255,204,0.1);
        }

        .card-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            color: var(--neon);
            letter-spacing: 2px;
            margin-bottom: 20px;
            text-shadow: 0 0 15px rgba(0,255,204,0.3);
        }

        .file-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 8px;
        }

        input[type="file"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(0,255,204,0.25);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Rajdhani', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.3s;
        }

        input[type="file"]:hover {
            border-color: var(--neon);
            background: rgba(0,255,204,0.04);
        }

        .preview-box {
            margin-top: 20px;
            border: 1px dashed rgba(0,255,204,0.2);
            border-radius: 12px;
            height: 100px;
            background: rgba(0,255,204,0.02);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 1px;
        }

        /* 3D Action Button */
        .action-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00ffcc, #00aaff);
            border: none;
            border-radius: 12px;
            color: #060e1a;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            font-weight: 900;
            letter-spacing: 3px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 6px 0 rgba(0,150,120,0.5), 0 10px 30px rgba(0,255,204,0.3);
            transition: all 0.2s;
            position: relative;
            top: 0;
        }

        .action-btn:hover {
            top: -3px;
            box-shadow: 0 9px 0 rgba(0,150,120,0.5), 0 15px 40px rgba(0,255,204,0.5);
        }
        .action-btn:active { top: 5px; box-shadow: 0 1px 0 rgba(0,150,120,0.5); }

        /* Status bar */
        .status-bar {
            margin-top: 20px;
            padding: 14px 20px;
            background: rgba(0,255,204,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon);
            letter-spacing: 2px;
            text-align: center;
            text-shadow: 0 0 10px rgba(0,255,204,0.3);
        }

        /* Support link */
        .support {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            padding: 14px;
            background: rgba(37,211,102,0.07);
            border: 1px solid rgba(37,211,102,0.2);
            border-radius: 12px;
            color: #25D366;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }
        .support:hover {
            background: rgba(37,211,102,0.14);
            border-color: #25D366;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37,211,102,0.2);
        }
    </style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-orb bg-orb1"></div>
<div class="bg-orb bg-orb2"></div>

<div class="main-wrap">

    <!-- Header -->
    <div class="header">
        <div>
            <div class="header-title">RC PDF · SMCSC</div>
            <div class="header-sub">Document Processing Portal</div>
        </div>
        <button class="logout-btn" onclick="logout()">⏻ LOGOUT</button>
    </div>

    <!-- Nav Buttons -->
    <div class="nav-row">
        <button class="nav-btn" onclick="loadHTML('py.html')">⊕ NEW RC PDF</button>
        <button class="nav-btn" onclick="loadHTML('page2.html')">⊕ KERALA</button>
        <button class="nav-btn" onclick="loadHTML('py1.html')">⊕ PONDICHERRY</button>
        <button class="nav-btn orange" onclick="window.open('pdf_bg_remover_v3.html','_blank')">⊘ PDF REMOVER</button>
    </div>

    <!-- Inline Viewer -->
    <div id="htmlViewer">
        <div class="viewer-header">
            <span class="viewer-title" id="viewTitle">RC PAGE VIEW</span>
            <button class="close-btn" onclick="closeHTML()">✕ CLOSE</button>
        </div>
        <iframe id="frameBox" src=""></iframe>
    </div>

    <!-- Upload Card -->
    <div class="card-grid">
        <div class="upload-card">
            <div class="card-icon">📄</div>
            <div class="card-title">SOURCE UPLOAD PDF</div>

            <label class="file-label">Select Source PDF</label>
            <input type="file" id="srcFile" accept=".pdf">

            <div class="preview-box" id="previewContainer">
                <span style="font-size:1.5rem;">🛡️</span>
                <span>Ready to process...</span>
            </div>

            <button class="action-btn" onclick="mergePDFs()">⚡ RC PDF & DOWNLOAD</button>
        </div>
    </div>

    <div class="status-bar" id="status">◉ SYSTEM READY</div>

    <a href="https://api.whatsapp.com/send?phone=917094041818&text=Hi%20SMCSC%20Support,%20I%20need%20help%20with%20the%20RC%20PDF%20Tool." target="_blank" class="support">
        <i class="fab fa-whatsapp" style="font-size:1.3rem;"></i> SMCSC SUPPORT
    </a>

</div>

<script>
    function loadHTML(fileName) {
        const viewer = document.getElementById('htmlViewer');
        const frame = document.getElementById('frameBox');
        frame.src = fileName;
        viewer.style.display = 'block';
        viewer.scrollIntoView({ behavior: 'smooth' });
        document.getElementById('status').innerText = "◉ LOADING INTERNAL PAGE...";
    }

    function closeHTML() {
        document.getElementById('frameBox').src = "";
        document.getElementById('htmlViewer').style.display = 'none';
        document.getElementById('status').innerText = "◉ SYSTEM READY";
    }

    let timeout;
    function logout() { window.location.href = "index.html"; }
    function resetTimer() {
        clearTimeout(timeout);
        timeout = setTimeout(logout, 600000);
    }
    window.onload = resetTimer;
    document.onmousemove = resetTimer;
    document.onkeypress = resetTimer;

    const { PDFDocument } = PDFLib;

    async function mergePDFs() {
        const srcInput = document.getElementById('srcFile').files[0];
        const status = document.getElementById('status');
        const fixedBgUrl = 'background.pdf';

        if (!srcInput) { alert("Please select a source file!"); return; }

        try {
            status.innerText = "⚡ MERGING FILES... PLEASE WAIT";
            const srcBytes = await srcInput.arrayBuffer();
            const srcDoc = await PDFDocument.load(srcBytes);
            const bgResponse = await fetch(fixedBgUrl, { cache: "no-store" });
            if (!bgResponse.ok) throw new Error("Background.pdf not found.");
            const bgBytes = await bgResponse.arrayBuffer();
            const dstDoc = await PDFDocument.load(bgBytes);
            const embeddedPages = await dstDoc.embedPdf(srcDoc);
            const dstPages = dstDoc.getPages();
            dstPages.forEach((page, index) => {
                const overlayPage = embeddedPages[index] || embeddedPages[0];
                const { width, height } = page.getSize();
                page.drawPage(overlayPage, { x: 0, y: 0, width, height });
            });
            const pdfBytes = await dstDoc.save();
            const blob = new Blob([pdfBytes], { type: "application/pdf" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "SM CSC_" + srcInput.name;
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
            URL.revokeObjectURL(url);
            status.innerText = "✓ DOWNLOAD SUCCESSFUL!";
        } catch (err) {
            status.innerText = "✕ ERROR: " + err.message;
        }
    }
</script>
</body>
</html>
