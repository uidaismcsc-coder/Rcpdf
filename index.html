
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SM CSC LOGIN</title>
    <style>
        :root {
            --primary: #6366f1;
            --success: #22c55e;
            --error: #ef4444;
            --bg: #0f172a;
        }

        body {
            background-color: var(--bg);
            font-family: 'Inter', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            perspective: 1200px;
            overflow: hidden;
            color: white;
        }

        /* 3D Wrapper */
        .card-container {
            width: 380px;
            height: 500px;
            position: relative;
            transition: transform 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }

        .card-container.flipped { transform: rotateY(180deg); }

        /* Card Faces */
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            padding: 40px;
            box-sizing: border-box;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .back { transform: rotateY(180deg); }

        h2 { margin: 0 0 10px 0; font-size: 1.8rem; }
        p { color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }

        .input-group { margin-bottom: 15px; width: 100%; }

        input {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: rgba(255, 255, 255, 0.1); }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        button:hover { filter: brightness(1.2); transform: translateY(-2px); }

        .message {
            margin-top: 15px;
            font-size: 0.85rem;
            text-align: center;
            min-height: 20px;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-weight: 600;
            padding: 0;
            margin-top: 20px;
            font-size: 0.9rem;
        }

        /* Ambient Background */
        .orb {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
            animation: drift 10s infinite alternate;
        }

        @keyframes drift {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="card-container" id="card">
        <div class="card-face front">
            <h2>Login</h2>
            <p>Access your local account</p>
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="loginPass" placeholder="Password">
            </div>
            <button onclick="handleLogin()">Sign In</button>
            <div id="loginMsg" class="message"></div>
            <center>
                <button class="toggle-btn" onclick="flip()">New here? Create Account</button>
            </center>
        </div>

        <div class="card-face back">
            <h2>Register</h2>
            <p>Data is stored in LocalStorage</p>
            <div class="input-group">
                <input type="text" id="regName" placeholder="Full Name">
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="Email Address">
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="Password">
            </div>
            <button onclick="handleSignup()">Create Account</button>
            <div id="regMsg" class="message"></div>
            <center>
                <button class="toggle-btn" onclick="flip()">Back to Login</button>
            </center>
        </div>
    </div>

    <script>
        const card = document.getElementById('card');

        function flip() {
            card.classList.toggle('flipped');
            clearMsgs();
        }

        function clearMsgs() {
            document.getElementById('loginMsg').innerText = '';
            document.getElementById('regMsg').innerText = '';
        }

        // REGISTER LOGIC
        function handleSignup() {
            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            const msg = document.getElementById('regMsg');

            if (!name || !email || !pass) {
                msg.style.color = 'var(--error)';
                msg.innerText = "Please fill all fields.";
                return;
            }

            // Check if user exists
            if (localStorage.getItem(email)) {
                msg.style.color = 'var(--error)';
                msg.innerText = "User already exists!";
                return;
            }

            // Save User
            const userData = { name, email, pass };
            localStorage.setItem(email, JSON.stringify(userData));
            
            msg.style.color = 'var(--success)';
            msg.innerText = "Success! Redirecting to login...";
            
            setTimeout(() => {
                flip();
                document.getElementById('regName').value = '';
                document.getElementById('regEmail').value = '';
                document.getElementById('regPass').value = '';
            }, 1500);
        }

        // LOGIN LOGIC
        function handleLogin() {
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPass').value;
            const msg = document.getElementById('loginMsg');

            const storedUser = localStorage.getItem(email);

            if (!storedUser) {
                msg.style.color = 'var(--error)';
                msg.innerText = "User not found.";
                return;
            }

            const user = JSON.parse(storedUser);

            if (user.pass === pass) {
                msg.style.color = 'var(--success)';
                msg.innerText = `Welcome back, ${user.name}!`;
                // 2. Redirect to your target HTML file
            // Make sure "dashboard.html" exists in the same folder
            window.location.href = "dashboard.html"; 
            } else {
                msg.style.color = 'var(--error)';
                msg.innerText = "Wrong password.";
            }
        }
    </script>
</body>
</html>
