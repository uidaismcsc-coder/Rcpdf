<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lion Pride | Secure Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- CSS STYLES --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* High-quality Lion Wallpaper with a dark overlay */
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.8)), 
                        url('https://images.unsplash.com/photo-1614027164847-1b28006879b2?q=80&w=1920') no-repeat center center/cover;
            overflow: hidden;
        }

        .login-container {
            position: relative;
            background: rgba(20, 20, 20, 0.85);
            border: 2px solid #d4af37; /* Gold Border */
            padding: 50px 40px;
            width: 100%;
            max-width: 420px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            backdrop-filter: blur(10px);
        }

        /* Gold Lion Head Icon/Logo placeholder */
        .lion-logo {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
        }

        h2 {
            color: #fff;
            letter-spacing: 3px;
            margin-bottom: 30px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .input-box {
            position: relative;
            margin-bottom: 25px;
        }

        .input-box input {
            width: 100%;
            background: transparent;
            border: none;
            border-bottom: 1px solid #555;
            padding: 10px 0;
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: 0.4s;
        }

        .input-box input:focus {
            border-bottom: 1px solid #d4af37;
        }

        .input-box label {
            position: absolute;
            top: 10px;
            left: 0;
            color: #888;
            pointer-events: none;
            transition: 0.4s;
        }

        .input-box input:focus ~ label,
        .input-box input:valid ~ label {
            top: -15px;
            font-size: 0.8rem;
            color: #d4af37;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(45deg, #d4af37, #f1c40f);
            border: none;
            border-radius: 5px;
            color: #000;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s ease;
            text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
        }

        button:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.6);
        }

        #status-msg {
            margin-top: 20px;
            height: 20px;
            font-weight: bold;
        }

        .creds-hint {
            margin-top: 30px;
            color: #555;
            font-size: 0.75rem;
            border-top: 1px solid #333;
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="lion-logo">🦁</div>
        <h2>RC Portal</h2>
        
        <form id="loginForm">
            <div class="input-box">
                <input type="text" id="username" required>
                <label>User ID</label>
            </div>
            <div class="input-box">
                <input type="password" id="password" required>
                <label>Password</label>
            </div>
            <button type="submit">Enter Access</button>
        </form>

        <p id="status-msg"></p>
    </div>

    <script>
        /* --- JAVASCRIPT LOGIC --- */
        const form = document.getElementById('loginForm');
        const status = document.getElementById('status-msg');

        // Set your default credentials here
        const DEFAULTS = {
            id: "admin",
            pass: "Siva9551"
        };

        form.addEventListener('submit', (e) => {
            e.preventDefault();

            const userVal = document.getElementById('username').value;
            const passVal = document.getElementById('password').value;

            if (userVal === DEFAULTS.id && passVal === DEFAULTS.pass) {
                status.style.color = "#2ecc71";
                status.textContent = "✓ Access Granted. Entering...";
                
                setTimeout(() => {
                    alert("Welcome back, Chief! Your portal is ready.");
                    // 2. Redirect to your target HTML file
            // Make sure "dashboard.html" exists in the same folder
            window.location.href = "dashboard.html"; 
                }, 1000);
            } else {
                status.style.color = "#e74c3c";
                status.textContent = "✗ Invalid ID or Password!";
                
                // Shake effect for the box
                document.querySelector('.login-container').style.animation = "shake 0.3s";
                setTimeout(() => {
                    document.querySelector('.login-container').style.animation = "";
                }, 300);
            }
        });
    </script>

    <style>
        /* Animation for Error Shake */
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }
    </style>

</body>
</html>
