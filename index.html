<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMCSC Login</title>
    <style>
        /* --- CSS STYLING --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135th, #11998e, #38ef7d); /* Jungle Gradient */
            font-family: 'Comic Sans MS', cursive, sans-serif;
            overflow: hidden;
        }

        /* Floating Paw Prints Background */
        .background-decor {
            position: absolute;
            font-size: 50px;
            opacity: 0.2;
            z-index: 0;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
            border: 8px solid #f9ca24; /* Giraffe Yellow */
            position: relative;
            z-index: 1;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            border: 4px solid #6ab04c;
        }

        h2 { color: #2d3436; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; text-align: left; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #badc58;
            border-radius: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #6ab04c; box-shadow: 0 0 8px #6ab04c; }

        .login-btn {
            background: #eb4d4b; /* Fox Red */
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .login-btn:hover { background: #ff7979; transform: scale(1.05); }

        #message { margin-top: 15px; font-weight: bold; min-height: 20px; }

        .hint { font-size: 12px; color: #636e72; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="background-decor" style="top: 10%; left: 10%;">🐾</div>
    <div class="background-decor" style="bottom: 10%; right: 15%;">🌿</div>
    <div class="background-decor" style="top: 20%; right: 10%;">🐒</div>
    <div class="background-decor" style="bottom: 20%; left: 15%;">🐘</div>

    <div class="login-container">
        <div class="avatar-circle" id="animal-avatar">🦁</div>
        <h2>RC PDF</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">ACCESS ACCOUNT 🐾</button>
        </form>

        <p id="message"></p>
        <div class="hint">ADMIN <b></b> SM <b></b>CSC</div>
    </div>

    <script>
        const DEFAULT_ID = "admin";
        const DEFAULT_PW = "Siva123";
        const animals = ['🦁', '🐯', '🐼', '🦊', '🐨', '🐸', '🐵'];

        const avatar = document.getElementById('animal-avatar');
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');

        // Randomly change animal avatar every 3 seconds
        setInterval(() => {
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            avatar.innerText = randomAnimal;
        }, 3000);

        form.onsubmit = (e) => {
            e.preventDefault();
            const userIn = document.getElementById('username').value;
            const passIn = document.getElementById('password').value;

            if (userIn === DEFAULT_ID && passIn === DEFAULT_PW) {
                message.style.color = "#27ae60";
                message.innerText = "Access Granted! Welcome, " + userIn + " 🐾";
                avatar.innerText = "👑";
                // 2. Redirect to your target HTML file
            // Make sure "dashboard.html" exists in the same folder
            window.location.href = "dashboard.html"; 
            } else {
                message.style.color = "#d63031";
                message.innerText = "Wrong path! The animals are growling...";
                // Shake effect
                form.style.transform = "translateX(10px)";
                setTimeout(() => form.style.transform = "translateX(0)", 100);
            }
        };
    </script>
</body>
</html>
