<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMCSC Login</title>
    <style>
        /* --- CSS STYLING --- */
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #11998e, #ffffff);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .background-decor {
            position: absolute;
            font-size: 50px;
            opacity: 0.2;
            z-index: 0;
            user-select: none;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 50px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 320px;
            text-align: center;
            border: 8px solid #f9ca24;
            position: relative;
            z-index: 1;
        }

        .avatar-circle {
            width: 100px;
            height: 100px;
            background: #f0f0f0;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            border: 4px solid #6ab04c;
        }

        h2 { color: #2d3436; margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; text-align: left; }

        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #badc58;
            border-radius: 20px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            font-size: 16px; /* Prevents auto-zoom on iPhone */
        }

        input:focus { border-color: #6ab04c; box-shadow: 0 0 8px #6ab04c; }

        .login-btn {
            background: #eb4d4b;
            color: white;
            border: none;
            padding: 15px;
            width: 100%;
            border-radius: 30px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .login-btn:hover { background: #ff7979; transform: scale(1.05); }

        #message { margin-top: 15px; font-weight: bold; min-height: 20px; font-size: 14px; }

        .hint { font-size: 12px; color: #636e72; margin-top: 10px; }

        /* Shake animation for incorrect password */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
        /* Floating WhatsApp Button */
.whatsapp-float {
    position: fixed;
    width: 60px;
    height: 60px;
    bottom: 20px;
    right: 20px;
    background-color: #25d366;
    color: #FFF;
    border-radius: 50px;
    text-align: center;
    font-size: 30px;
    box-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    z-index: 100;
    display: flex;
    justify-content: center;
    align-items: center;
    text-decoration: none;
    transition: transform 0.3s ease;
}

.whatsapp-float:hover {
    transform: scale(1.1);
    color: white;
}

/* Optional Pulse Animation */
.whatsapp-float::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    border: 2px solid #25d366;
    animation: pulse 2s infinite;
}

@keyframes pulse {
    0% { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.5); opacity: 0; }
}
    </style>
</head>
<body>

    <div class="background-decor" style="top: 10%; left: 10%;">🐾</div>
    <div class="background-decor" style="bottom: 10%; right: 15%;">🌿</div>
    <div class="background-decor" style="top: 20%; right: 10%;">🦁</div>
    <div class="background-decor" style="bottom: 20%; left: 15%;">🐘</div>

    <div class="login-container" id="loginBox">
        <div class="avatar-circle" id="animal-avatar">🦁</div>
        <h2>RC PDF</h2>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required autocomplete="off">
            </div>
            <button type="submit" class="login-btn">ACCESS ACCOUNT 🐾</button>
        </form>

        <p id="message"></p>
        <div class="hint">ADMIN <b>SM</b> CSC</div>
    </div>
    <a href="https://wa.me/917094041818?text=Hello%20SMCSC%20Support,%20I%20need%20help%20with%20the%20RC%20PDF%20Portal." 
   class="whatsapp-float" 
   target="_blank">
    <svg width="35" height="35" viewBox="0 0 24 24" fill="white">
        <path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946.003-6.556 5.338-11.891 11.893-11.891 3.181.001 6.167 1.24 8.413 3.488 2.245 2.248 3.481 5.236 3.48 8.414-.003 6.557-5.338 11.892-11.893 11.892-1.99-.001-3.951-.5-5.688-1.448l-6.305 1.654zm6.597-3.807c1.676.995 3.276 1.591 5.392 1.592 5.448 0 9.886-4.438 9.889-9.886.002-5.462-4.415-9.89-9.881-9.892-5.452 0-9.887 4.435-9.889 9.886-.001 2.225.651 3.891 1.746 5.634l-.999 3.648 3.742-.982zm11.387-5.464c-.074-.124-.272-.198-.57-.347-.297-.149-1.758-.868-2.031-.967-.272-.099-.47-.149-.669.149-.198.297-.768.967-.941 1.165-.173.198-.347.223-.644.074-.297-.149-1.255-.462-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.297-.347.446-.521.151-.172.2-.296.3-.495.099-.198.05-.372-.025-.521-.075-.148-.669-1.611-.916-2.206-.242-.579-.487-.501-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.076 4.487.709.306 1.263.489 1.694.626.712.226 1.36.194 1.872.118.571-.085 1.758-.719 2.006-1.413.248-.695.248-1.29.173-1.414z"/>
    </svg>
</a>

    <script>
        // Configuration
        const DEFAULT_ID = "admin";
        const DEFAULT_PW = "Siva123";
        const animals = ['🦁', '🐯', '🐼', '🦊', '🐨', '🐸', '🐵'];

        const avatar = document.getElementById('animal-avatar');
        const form = document.getElementById('loginForm');
        const message = document.getElementById('message');
        const loginBox = document.getElementById('loginBox');

        // Randomly change animal avatar for a modern feel
        setInterval(() => {
            const randomAnimal = animals[Math.floor(Math.random() * animals.length)];
            if(avatar.innerText !== "👑") {
                avatar.innerText = randomAnimal;
            }
        }, 3000);

        // --- LOGIN LOGIC ---
        form.onsubmit = (e) => {
            e.preventDefault();
            
            // .trim() removes accidental spaces added by mobile auto-correct
            const userIn = document.getElementById('username').value.trim();
            const passIn = document.getElementById('password').value.trim();

            if (userIn === DEFAULT_ID && passIn === DEFAULT_PW) {
                // SUCCESS
                message.style.color = "#27ae60";
                message.innerText = "Access Granted! 🐾";
                avatar.innerText = "👑";
                
                // Initialize session storage for the 10-minute timer on dashboard
                sessionStorage.setItem("isLoggedIn", "true");
                sessionStorage.setItem("lastActivity", Date.now());

                // Redirect after a small delay to show success message
                setTimeout(() => {
                    window.location.replace("dashboard.html"); 
                }, 800);
            } else {
                // FAILURE
                message.style.color = "#d63031";
                message.innerText = "Invalid Credentials. Please try again.";
                
                // Trigger the Shake Effect
                loginBox.style.animation = "none";
                void loginBox.offsetWidth; // Trigger reflow to restart animation
                loginBox.style.animation = "shake 0.3s ease-in-out";
                
                // Reset password field for security
                document.getElementById('password').value = "";
            }
        };

        // Clear any old sessions whenever the user lands on the login page
        window.onload = () => {
            sessionStorage.clear();
        };
    </script>
</body>
</html>
