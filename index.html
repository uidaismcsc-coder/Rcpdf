<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Login Page</title>
    <style>
        /* CSS - Styling the Page */
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #fff;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 1.5rem;
        }

        .input-group {
            margin-bottom: 1rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 1rem;
        }

        button:hover {
            background-color: #5a3782;
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
            min-height: 1.2rem;
        }

        .error { color: #e74c3c; }
        .success { color: #2ecc71; }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>Welcome Back</h2>
        <form id="loginForm">
            <div class="input-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter admin" required>
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter 12345" required>
            </div>
            <button type="submit">Login</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        // JavaScript - Logic and Validation
        const loginForm = document.getElementById('loginForm');
        const message = document.getElementById('message');

        // Default Credentials
        const VALID_USER = "admin";
        const VALID_PASS = "12345";

        loginForm.addEventListener('submit', (e) => {
            e.preventDefault(); // Prevent page refresh

            const userEntry = document.getElementById('username').value;
            const passEntry = document.getElementById('password').value;

            if (userEntry === VALID_USER && passEntry === VALID_PASS) {
                message.textContent = "Login Successful! Redirecting...";
                message.className = "success";
                
                // Simulate redirection
                setTimeout(() => {
                    alert("Welcome, Admin!");
                    // 1. Show a success message (Optional)
            alert("Login Successful! Redirecting to Dashboard...");

            // 2. Redirect to your target HTML file
            // Make sure "dashboard.html" exists in the same folder
            window.location.href = "dashboard.html"; 
                }, 1000);

            } else {
                message.textContent = "Invalid username or password.";
                message.className = "error";
                
                // Visual shake effect (optional)
                loginForm.style.animation = "shake 0.2s ease-in-out 0s 2";
            }
        });
    </script>

</body>
</html>
